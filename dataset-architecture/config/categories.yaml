# Dataset Categories Configuration
# Defines all 10 dataset categories with metadata

categories:
  competitive_programming:
    display_name: "Competitive Programming"
    description: "CP problems from platforms like Codeforces, AtCoder, LeetCode"
    weight: 0.15
    max_examples: 500_000
    sources:
      - codeforces
      - atcoder
      - leetcode_contest
      - codechef
    formats:
      - instruction_tuning
      - code_completion
      - chain_of_thought
    difficulty_levels: [1, 2, 3, 4, 5]
    quality_threshold: 0.75

  algorithms_dsa:
    display_name: "Algorithms & DSA"
    description: "Data structures, algorithms, design patterns, complexity analysis"
    weight: 0.15
    max_examples: 400_000
    sources:
      - leetcode
      - hackerrank
      - geeksforgeeks
      - algoexpert
    formats:
      - instruction_tuning
      - code_completion
      - tool_calling
    difficulty_levels: [1, 2, 3, 4, 5]
    quality_threshold: 0.70

  debugging:
    display_name: "Debugging"
    description: "Buggy code with fixes, error messages, stack traces, root cause analysis"
    weight: 0.12
    max_examples: 300_000
    sources:
      - stackoverflow
      - github_issues
      - swe_bench
      - defect_detection
    formats:
      - bug_fixing
      - instruction_tuning
      - chain_of_thought
    difficulty_levels: [1, 2, 3, 4, 5]
    quality_threshold: 0.75

  system_design:
    display_name: "System Design"
    description: "Architecture design, scalability, trade-offs, distributed systems"
    weight: 0.10
    max_examples: 200_000
    sources:
      - grokking_system_design
      - system_design_interview
      - awesome_system_design
    formats:
      - instruction_tuning
      - chat_conversations
      - chain_of_thought
    difficulty_levels: [2, 3, 4, 5]
    quality_threshold: 0.72

  general_reasoning:
    display_name: "General Reasoning"
    description: "Logical reasoning, critical thinking, problem decomposition, analogies"
    weight: 0.10
    max_examples: 350_000
    sources:
      - bbh
      - gsm8k
      - arc_challenge
      - logical_fallacies
    formats:
      - instruction_tuning
      - chain_of_thought
      - chat_conversations
    difficulty_levels: [1, 2, 3, 4, 5]
    quality_threshold: 0.70

  math_logic:
    display_name: "Math & Logic"
    description: "Mathematics, proofs, formal logic, statistics, probability"
    weight: 0.10
    max_examples: 300_000
    sources:
      - math_dataset
      - theorem_proving
      - mmlu_math
      - proving
    formats:
      - instruction_tuning
      - chain_of_thought
      - code_completion
    difficulty_levels: [1, 2, 3, 4, 5]
    quality_threshold: 0.75

  conversational_ai:
    display_name: "Conversational AI"
    description: "Multi-turn dialogue, persona, empathy, follow-up handling, instruction following"
    weight: 0.10
    max_examples: 500_000
    sources:
      - sharegpt
      - oasst1
      - ultrafeedback
      - dolly
    formats:
      - chat_conversations
      - instruction_tuning
      - retrieval_augmentation
    difficulty_levels: [1, 2, 3, 4]
    quality_threshold: 0.68

  technical_documentation:
    display_name: "Technical Documentation"
    description: "API docs, READMEs, tutorials, explanations, code comments"
    weight: 0.06
    max_examples: 250_000
    sources:
      - github_readmes
      - python_docs
      - rust_docs
      - api_docs
    formats:
      - instruction_tuning
      - retrieval_augmentation
      - chat_conversations
    difficulty_levels: [1, 2, 3]
    quality_threshold: 0.65

  tool_usage:
    display_name: "Tool Usage"
    description: "Function calling, API usage, shell commands, git, Docker, cloud tools"
    weight: 0.06
    max_examples: 200_000
    sources:
      - tool_bench
      - api_bench
      - func_calling
    formats:
      - tool_calling
      - instruction_tuning
      - code_completion
    difficulty_levels: [1, 2, 3, 4]
    quality_threshold: 0.70

  file_image_understanding:
    display_name: "File/Image Understanding"
    description: "Code file analysis, image captioning, diagram understanding, OCR"
    weight: 0.06
    max_examples: 200_000
    sources:
      - chart_qa
      - diagram_understanding
      - code_file_analysis
    formats:
      - instruction_tuning
      - retrieval_augmentation
      - chat_conversations
    difficulty_levels: [1, 2, 3, 4]
    quality_threshold: 0.68

# Training mix configuration
training_mix:
  total_target: 1_000_000
  curriculum_proportion: 0.60
  random_proportion: 0.40
  eval_holdout: 0.05
