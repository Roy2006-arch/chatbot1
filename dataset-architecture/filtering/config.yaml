filtering:
  min_quality_score: 0.5
  max_hallucination_score: 0.3
  max_repetition_score: 0.4
  min_reasoning_score: 0.5
  max_toxicity_score: 0.2
  max_semantic_similarity: 0.85

  enable_code_validation: true
  enable_markdown_validation: true
  enable_hallucination_check: true
  enable_repetition_check: true
  enable_reasoning_check: true
  enable_toxicity_check: true
  enable_semantic_dedup: true

  embedding_model: "all-MiniLM-L6-v2"
  num_workers: 8
  output_dir: "filtering_data"

quality_scoring:
  dimensions:
    relevance:
      weight: 0.15
    factual_correctness:
      weight: 0.20
    completeness:
      weight: 0.10
    clarity:
      weight: 0.05
    safety:
      weight: 0.15
    instruction_following:
      weight: 0.05
    non_repetitiveness:
      weight: 0.10
    reasoning_quality:
      weight: 0.10
    hallucination_free:
      weight: 0.10

hallucination:
  hedging_threshold: 0.3
  vagueness_threshold: 0.4
  max_unverifiable_claims: 2
  contradiction_check: true
  confidence_mismatch_check: true

repetition:
  ngram_size: 4
  ngram_threshold: 0.3
  sentence_similarity_threshold: 0.85
  max_filler_ratio: 0.05
  chunk_repetition_check: true

reasoning:
  min_steps: 2
  conclusion_required: true
  truncation_check: true
  min_cot_length: 50
  step_label_required: true

toxicity:
  profanity_threshold: 0.5
  hate_speech_threshold: 0.5
  harassment_threshold: 0.5
  self_harm_threshold: 0.3
  violence_threshold: 0.5
  nsfw_threshold: 0.5

semantic_similarity:
  model: "all-MiniLM-L6-v2"
  threshold: 0.85
  batch_size: 64
  use_gpu: false

code_validation:
  max_code_length: 10000
  enable_ast_check: true
  enable_bracket_check: true
  enable_test_execution: false
  supported_languages:
    - python
    - javascript
    - typescript
    - java
    - cpp
    - rust
    - go
    - ruby
    - php
    - csharp

markdown_validation:
  max_heading_depth: 6
  max_table_columns: 20
  max_list_nesting: 6
  check_code_fences: true
  check_heading_order: true
  check_link_validity: true
  check_image_alt: true
  check_html_closure: true
